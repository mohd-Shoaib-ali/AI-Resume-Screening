services:
  - type: web
    name: resume-match-api
    env: python
    plan: free
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./app.db
      - key: MODEL_NAME
        value: sentence-transformers/all-MiniLM-L6-v2
      - key: HF_TOKEN
        sync: false