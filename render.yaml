services:
  - type: web
    name: resume-match-api
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: resume-match-db
          property: connectionString

databases:
  - name: resume-match-db
    plan: free